<!DOCTYPE html>
<html>
 <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      width: 900px;
      max-width: 95%;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* 左边 */
    .left {
      flex: 1;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .left p {
      opacity: 0.8;
    }

    /* 右边 */
    .right {
      flex: 1;
      padding: 40px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #667eea;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }

    .footer {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #888;
    }

    /* 手机版 */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left {
        display: none;
      }
    }
  </style>
<body onload="loadStatus();loadUserInfo();">
<h2>PUNCHCARD SYSTEM</h2>

<button id="checkInBtn" onclick="check()">CHECK IN</button>
<button id="checkOutBtn" onclick="check()" style="display:none;">CHECK OUT</button>

<script src="/app.js"></script>
</body>
</html>
