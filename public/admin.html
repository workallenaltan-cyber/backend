<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <!-- ✅ favicon -->
  <link rel="icon" type="image/png" href="/img/mnl_icon.png">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- ✅ Sidebar -->
<div class="sidebar" id="sidebar">
  <h2>⚙️ Admin</h2>
  <a href="admin.html">📊 打卡记录</a>
  <a href="employees.html">👥 员工管理</a>
  <a href="#" onclick="logout()">🚪 退出</a>
</div>

<!-- ✅ 主内容 -->
<div class="main" id="main">

  <!-- 顶部 -->
  <div class="topbar">
    <button class="toggle-btn" onclick="toggleMenu()">☰</button>

    <div class="top-actions">
      <input type="text" id="searchInput" placeholder="搜索员工..." onkeyup="filterTable()">
      <button class="btn" onclick="exportExcel()">导出 Excel</button>
    </div>
  </div>

  <!-- 标题 -->
  <h2>打卡记录（管理员）</h2>

  <!-- 表格卡片 -->
  <div class="card">
    <table id="dataTable">
      <thead>
        <tr>
          <th>员工ID</th>
          <th>员工</th>
          <th>公司</th>
          <th>日期</th>
          <th>上班</th>
          <th>下班</th>
          <th>上班地点</th>
          <th>下班地点</th>
          <th>上班IP</th>
          <th>下班IP</th>
          <th>状态</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="11">加载中...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="app.js"></script>

<script>
// =====================
// ✅ Sidebar 切换
// =====================
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("hide");
  document.getElementById("main").classList.toggle("full");
}

// =====================
// ✅ 搜索过滤
// =====================
function filterTable() {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const rows = document.querySelectorAll("#tableBody tr");

  rows.forEach(row => {
    const text = row.innerText.toLowerCase();
    row.style.display = text.includes(input) ? "" : "none";
  });
}

// =====================
// ✅ 退出
// =====================
function logout() {
  localStorage.clear();
  location.href = "index.html";
}
</script>

</body>
</html>
