<script>
fetch("/api/status", {
  headers: {
    "authorization": localStorage.getItem("token")
  }
})
.then(res => res.json())
.then(status => {

  if (status.status === "not_checked_in" && location.pathname.includes("checkin")) return;
  if (status.status === "checked_in" && location.pathname.includes("checkout")) return;
  if (status.status === "completed" && location.pathname.includes("done")) return;

  // ❌ 状态不匹配 → 重定向
  location.href = "dashboard.html";
});
</script>

<!DOCTYPE html>
<html>

<body onload="loadAll()">

<h2>打卡记录（管理员）</h2>
<button onclick="exportExcel()">导出 Excel</button>

<table border="1">
  <thead>

      <th>员工ID</th>

      <th>下班时间</th>
      <th>上班地点</th>
      <th>下班地点</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

</html>
