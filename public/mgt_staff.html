<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staff Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>

<body onload="loadStaff()">

  <h2>Staff Management</h2>

  <!-- ✅ Add Button -->
  <button onclick="openAddDialog()">+ Add Staff</button>

  <!-- ✅ Staff Table -->
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Employee ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="staffTable"></tbody>
    </table>
  </div>

  <!-- ========================= -->
  <!-- ✅ Modal (Add / Edit Staff) -->
  <!-- ========================= -->
  <div id="staffModal" class="modal">
    <div class="modal-content">

      <h3 id="modalTitle">Add Staff</h3>

      <input id="modalName" placeholder="Enter Name">
      <input id="modalEmail" placeholder="Enter Email">
      <input id="modalPassword" type="password" placeholder="Enter Password">

      <div class="modal-actions">
        <button onclick="saveStaff()">Save</button>
        <button onclick="closeModal()">Cancel</button>
      </div>

    </div>
  </div>

  <!-- ========================= -->
  <!-- ✅ Change Password Modal -->
  <!-- ========================= -->
  <div id="passwordModal" class="modal">
    <div class="modal-content">

      <h3>Change Password</h3>

      <input id="newPassword" type="password" placeholder="New Password">

      <div class="modal-actions">
        <button onclick="submitPassword()">Update</button>
        <button onclick="closePasswordModal()">Cancel</button>
      </div>

    </div>
  </div>

  <!-- JS -->
  <script src="/js/app.js"></script>

</body>
</html>
