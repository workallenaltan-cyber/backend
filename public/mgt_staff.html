<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staff Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/css/style.css">
</head>

<body onload="loadStaff()">

<!-- ================= Sidebar ================= -->
<div class="sidebar">
  <h2>Admin Panel</h2>

  <a href="admin.html">📊 Dashboard</a>
  <a href="mgt_staff.html" class="active">👥 Staff Management</a>
  <a href="records.html">📋 Attendance</a>

  <button onclick="logout()">🚪 Logout</button>
</div>

<!-- ================= Main ================= -->
<div class="main">

  <!-- Header -->
  <div class="header">
    <h2>Staff Management</h2>
    <button onclick="openAddDialog()">+ Add Staff</button>
  </div>

  <!-- Table -->
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Employee ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="staffTable"></tbody>
    </table>
  </div>

</div>

<!-- ================= Modal (Add/Edit) ================= -->
<div id="staffModal" class="modal">
  <div class="modal-content">

    <h3 id="modalTitle">Add Staff</h3>

    <input id="modalName" placeholder="Name">
    <input id="modalEmail" placeholder="Email">
    <input id="modalPassword" type="password" placeholder="Password">

    <div class="modal-actions">
      <button onclick="saveStaff()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>

  </div>
</div>

<!-- ================= Modal (Change Password) ================= -->
<div id="passwordModal" class="modal">
  <div class="modal-content">

    <h3>Change Password</h3>

    <input id="newPassword" type="password" placeholder="New Password">

    <div class="modal-actions">
      <button onclick="submitPassword()">Update</button>
      <button onclick="closePasswordModal()">Cancel</button>
    </div>

  </div>
</div>

<script src="/js/app.js"></script>

</body>
</html>
