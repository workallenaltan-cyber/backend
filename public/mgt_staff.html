<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staff Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- ================= Sidebar ================= -->
<div class="sidebar" id="sidebar">
											

	<div class="logo">
	  <img src="mnl_icon.png" alt="MNL Logo">
	</div>

  <!-- ✅ 按钮放这里 -->
													 

  <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
								 
   
 

  <a href="admin.html" class="menu active">
    📊 <span>Dashboard</span>
  </a>

  <a href="employees.html" class="menu">
    👥 <span>员工管理</span>
  </a>

  <a href="company.html" class="menu">
    🏢 <span>公司管理</span>
  </a>
   
   

  <a href="settings.html" class="menu">
    ⚙️ <span>设置</span>
  </a>

</div>

<!-- ================= Main ================= -->
<div id="main">
  <!-- 顶部 -->
  <div class="topbar">

    <div class="top-actions">
	  <h2>Staff Management</h2>
	  <button onclick="openAddDialog()">+ Add Staff</button>
    </div>
  </div>

  <!-- Table -->
  <div class="card">
    <table id="dataaTable">
      <thead>
        <tr>
          <th>Employee ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="staffTable">
		 <tr><td colspan="11">加载中...</td></tr>
	  </tbody>
    </table>
  </div>

</div>

<!-- ================= Modal (Add/Edit) ================= -->
<div id="staffModal" class="modal">
  <div class="modal-content">

    <h3 id="modalTitle">Add Staff</h3>

    <input id="modalName" placeholder="Name">
    <input id="modalEmail" placeholder="Email">
    <input id="modalPassword" type="password" placeholder="Password">

    <div class="modal-actions">
      <button onclick="saveStaff()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>

  </div>
</div>

<!-- ================= Modal (Change Password) ================= -->
<div id="passwordModal" class="modal">
  <div class="modal-content">

    <h3>Change Password</h3>

    <input id="newPassword" type="password" placeholder="New Password">

    <div class="modal-actions">
      <button onclick="submitPassword()">Update</button>
      <button onclick="closePasswordModal()">Cancel</button>
    </div>

  </div>
</div>

<script src="/js/app.js"></script>

</body>
</html>
