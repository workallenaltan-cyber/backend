<!DOCTYPE html>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== 基础 ===== */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== 容器 ===== */
.container {
  width: 100%;
  max-width: 500px;
  height: 100%;
  background: #fff;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== 内容 ===== */
.center {
  text-align: center;
  width: 100%;
  padding: 20px;
}

/* ===== 按钮 ===== */
button {
  width: 100%;
  padding: 16px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}
</style>

<body>

<div class="container">
  <div class="center">

    <!-- ✅ 用户信息 -->
    <div id="userInfo" style="margin-bottom:20px;"></div>

    <!-- ✅ 按钮 -->
    <button id="checkOutBtn" onclick="check()">CHECK OUT</button>

  </div>
</div>

<!-- ✅ 只保留这个 -->
<script src="/app.js"></script>

</body>
</html>
