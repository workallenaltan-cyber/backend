<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>MNL DIGITAL ATTENDANCE</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      width: 900px;
      max-width: 95%;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .left {
      flex: 1;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 40px;
    }

    .right {
      flex: 1;
      padding: 40px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .left { display: none; }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="left">
    <h1>MNL DIGITAL ATTENDANCE SYSTEM</h1>
    <p>PUSAT TIMBANG</p>
  </div>

  <div class="right">
    <h2>LOGIN</h2>

    <input type="text" id="id" placeholder="STAFFID">
    <input type="password" id="pw" placeholder="PASSWORD">

    <button onclick="login()">LOGIN</button>
  </div>

</div>

<!-- ✅ 引入 JS -->
<script src="/app.js"></script>

</body>
</html>
