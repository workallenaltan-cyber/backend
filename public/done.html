<script>
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "login.html";
}

// ✅ 只保留 status 控制跳转
fetch("/api/status", {
  headers: {
    "Authorization": "Bearer " + token
  }
})
.then(res => res.json())
.then(status => {

  console.log("STATUS:", status);

  if (status.status === "not_checked_in") {
    if (!location.pathname.includes("checkin")) {
      window.location.href = "checkin.html";
    }
  }

  else if (status.status === "checked_in") {
    if (!location.pathname.includes("checkout")) {
      window.location.href = "checkout.html";
    }
  }

  else if (status.status === "completed") {
    if (!location.pathname.includes("done")) {
      window.location.href = "done.html";
    }
  }

});

function loadTodayRecord() {
  fetch("/api/my-today", {
    headers: {
      "authorization": localStorage.getItem("token")
    }
  })
  .then(res => res.json())
  .then(data => {
    console.log("今日记录:", data);

    document.getElementById("checkInTime").innerText =
      data.check_in_time || "";

    document.getElementById("checkOutTime").innerText =
      data.check_out_time || "";

    document.getElementById("date").innerText =
      data.adate || "";
  });
}
</script>


<!DOCTYPE html>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <style>

<body onload="loadTodayRecord(); loadUserInfo();">
